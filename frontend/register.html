<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - LexTech AI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Crear cuenta</h1>

    <form id="registroForm">

        <input
            type="text"
            id="nombre"
            placeholder="Nombre"
            required>

        <input
            type="email"
            id="email"
            placeholder="Correo electrónico"
            required>

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required>

        <button type="submit">
            Crear cuenta
        </button>

    </form>

    <p id="mensaje"></p>

    <!-- Cargar el archivo JavaScript -->
    <script src="register.js"></script>

</body>

</html>
